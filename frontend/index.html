<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人博客系统</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="container">
      <nav>
        <h1>个人博客系统</h1>
        <ul id="nav-links">
          <li><a href="#" onclick="showPage('home')">首页</a></li>
          <li><a href="#" onclick="showFavorites()" id="favorites-link" class="hidden">我的收藏</a></li>
          <li><a href="#" onclick="showPage('login')" id="login-link">登录</a></li>
          <li><a href="#" onclick="showPage('register')" id="register-link">注册</a></li>
          <li><a href="#" onclick="showPage('dashboard')" id="dashboard-link" class="hidden">管理面板</a></li>
          <li id="user-profile" class="hidden">
            <div class="user-dropdown">
              <a href="#" id="user-menu-toggle" class="user-menu-toggle">
                <span id="user-role-text"></span>
                <span class="dropdown-arrow">▼</span>
              </a>
              <div id="user-dropdown-menu" class="user-dropdown-menu hidden">
                <a href="#" onclick="showAccountModal()">账户管理</a>
                <a href="#" onclick="showFavorites()">我的收藏</a>
                <a href="#" onclick="logout()">退出</a>
              </div>
            </div>
          </li>
          <li><a href="#" onclick="logout()" id="logout-link" class="hidden">退出</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <div class="container">
    <div id="login-page" class="login-form hidden">
      <h2>登录</h2>
      <form id="login-form">
        <div class="form-group">
          <label>用户名</label>
          <input type="text" id="login-username" required>
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="login-password" required>
        </div>
        <button type="submit" class="btn">登录</button>
        <p style="text-align:center;margin-top:10px;">还没有账号? <a href="#" onclick="showPage('register')">立即注册</a></p>
      </form>
    </div>

    <div id="register-page" class="register-form hidden">
      <h2>用户注册</h2>
      <form id="register-form">
        <div class="form-group">
          <label>用户名</label>
          <input type="text" id="register-username" required>
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="register-password" required>
        </div>
        <div class="form-group">
          <label>确认密码</label>
          <input type="password" id="register-confirm-password" required>
        </div>
        <button type="submit" class="btn">注册</button>
        <p style="text-align:center;margin-top:10px;">已有账号? <a href="#" onclick="showPage('login')">立即登录</a></p>
      </form>
    </div>

    <div id="home-page" class="hidden">
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="搜索文章标题或内容...">
        <select id="filter-category" onchange="console.log('onchange categoryId:', this.value); currentPage=1; loadPosts(1)">
          <option value="">全部分类</option>
        </select>
        <button class="btn" onclick="currentPage=1; loadPosts(1)">搜索</button>
      </div>
      <div id="tag-filter-info" class="hidden" style="text-align: center; padding: 10px; margin-bottom: 15px; background: #e3f2fd; border-radius: 8px;">
        <span>当前标签筛选: <strong id="current-filter-tag"></strong></span>
        <button class="btn" onclick="clearTagFilter()" style="margin-left: 10px; padding: 4px 12px; font-size: 12px;">清除筛选</button>
      </div>
      <div class="posts-list">
        <h2>文章列表</h2>
        <div id="posts-container"></div>
      </div>
    </div>

    <div id="post-detail-page" class="post-detail hidden">
      <h2 id="post-title"></h2>
      <div class="post-meta" id="post-meta"></div>
      <div class="tag-list" id="post-tags"></div>
      <div class="post-content" id="post-content"></div>
      <div id="post-actions" class="post-actions hidden"></div>

      <div id="favorite-section" class="post-actions">
        <button class="btn btn-warning" onclick="toggleFavorite(${post.id})" id="favorite-btn-detail-${post.id}">
          ${post.isFavorite ? '❤️ 已收藏' : '🤍 收藏'}
        </button>
        ${post.favorites ? `<span style="margin-left: 10px; font-size: 14px; color: var(--gray-color);">收藏: ${post.favorites}</span>` : ''}
      </div>

      <div class="comments-section">
        <h3>评论</h3>
        <div id="comments-container"></div>
        <div class="comment-form">
          <h4>发表评论</h4>
          <form id="comment-form">
            <textarea id="comment-content" placeholder="请输入评论内容" required></textarea>
            <button type="submit" class="btn">提交评论</button>
          </form>
        </div>
      </div>
    </div>

    <div id="favorites-page" class="posts-list hidden">
      <h2>我的收藏</h2>
      <div id="favorites-container"></div>
    </div>

    <div id="dashboard-page" class="dashboard hidden">
      <h2>管理面板</h2>
      <div class="tab-nav">
        <button onclick="showTab('posts')" class="active" id="tab-posts">文章管理</button>
        <button onclick="showTab('categories')" id="tab-categories">分类管理</button>
        <button onclick="showTab('users')" id="tab-users" class="hidden">用户管理</button>
      </div>

      <div id="tab-content-posts" class="tab-content">
        <div style="display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap;">
          <div style="flex: 1; min-width: 300px;">
            <button class="btn btn-success" onclick="toggleCreateForm()">+ 创建文章</button>
          </div>
          <div id="admin-pending-section" class="hidden" style="flex: 1; min-width: 300px;">
            <button class="btn btn-warning" onclick="togglePendingPosts()" id="pending-toggle-btn">📋 待审核文章</button>
          </div>
        </div>

        <div style="display: flex; gap: 20px; flex-wrap: wrap;">
          <div id="create-post-form-container" class="create-post-form hidden" style="flex: 1; min-width: 300px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
              <h3>创建文章</h3>
              <button type="button" class="btn" onclick="toggleCreateForm()">×</button>
            </div>
            <form id="create-post-form">
              <input type="text" id="new-post-title" placeholder="标题" required>
              <select id="new-post-categoryId" required></select>
              <input type="text" id="new-post-tags" placeholder="标签，用逗号分隔">
              <select id="new-post-status">
                <option value="draft">草稿</option>
                <option value="pending">待审核</option>
                <option value="published" id="new-post-status-published">直接发布</option>
              </select>
              <textarea id="new-post-content" placeholder="内容" required></textarea>
              <button type="submit" class="btn">创建</button>
            </form>
          </div>

          <div id="pending-posts-container" class="manage-section hidden" style="flex: 1; min-width: 300px;"></div>
        </div>

        <div class="manage-section" style="margin-top: 20px;">
          <h3 id="my-posts-title">我的文章</h3>
          <div id="my-posts-container"></div>
        </div>
      </div>

      <div id="tab-content-categories" class="tab-content hidden">
        <div class="create-post-form">
          <h3>添加分类</h3>
          <form id="create-category-form">
            <input type="text" id="new-category-name" placeholder="分类名称" required>
            <input type="text" id="new-category-description" placeholder="分类描述">
            <button type="submit" class="btn">添加</button>
          </form>
        </div>
        <div class="manage-section">
          <h3>分类列表</h3>
          <div id="categories-container"></div>
        </div>
      </div>

      <div id="tab-content-users" class="tab-content hidden">
        <div style="margin-bottom: 20px;">
          <input type="text" id="users-search" placeholder="搜索用户名..." style="padding: 8px; margin-right: 10px; width: 200px;">
          <button class="btn" onclick="loadUsers()">搜索</button>
        </div>
        <div class="manage-section">
          <h3>用户列表</h3>
          <div id="users-container"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="edit-post-modal" class="modal" style="display: none;">
    <div class="modal-content">
      <h3>编辑文章</h3>
      <form id="edit-post-form">
        <input type="hidden" id="edit-post-id">
        <input type="text" id="edit-post-title" placeholder="标题" required>
        <select id="edit-post-categoryId" required></select>
        <input type="text" id="edit-post-tags" placeholder="标签，用逗号分隔">
        <select id="edit-post-status">
          <option value="draft">草稿</option>
          <option value="pending">待审核</option>
          <option value="published">已发布</option>
          <option value="archived">已归档</option>
        </select>
        <textarea id="edit-post-content" placeholder="内容" required></textarea>
        <div class="modal-actions">
          <button type="button" class="btn" onclick="closeEditModal()">取消</button>
          <button type="submit" class="btn btn-success">保存</button>
        </div>
      </form>
    </div>
  </div>

  <div id="account-modal" class="modal" style="display: none;">
    <div class="modal-content">
      <h3>账户管理</h3>
      <form id="update-account-form">
        <div class="form-group">
          <label>当前用户名：<span id="current-username"></span></label>
        </div>
        <div class="form-group">
          <label>新用户名：</label>
          <input type="text" id="new-username" placeholder="输入新用户名">
        </div>
        <div class="form-group">
          <label>新密码：</label>
          <input type="password" id="new-password" placeholder="输入新密码">
        </div>
        <div class="form-group">
          <label>确认新密码：</label>
          <input type="password" id="confirm-password" placeholder="确认新密码">
        </div>
        <div class="modal-actions">
          <button type="button" class="btn" onclick="closeAccountModal()">取消</button>
          <button type="submit" class="btn btn-success">更新账户</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
